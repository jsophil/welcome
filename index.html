<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to JSOPhil Enterprises</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JSOPhil Enterprises - Suzuki Marine dealer and Ecstar Oil retailer.">
  <meta name="keywords" content="JSOPhil, Suzuki Marine, Ecstar Oil, Suzuki parts, marine services">
  <meta name="author" content="Jaco Soler">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      margin: 0;
      padding: 0;
      text-align: center;
      overflow-x: hidden;
    }

    .jsophil-logo {
      display: block;
      margin: 15px auto;
      width: 45vw;
      height: auto;
    }

    h1, h2, p {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    h1 {
      color: darkgray;
      font-size: clamp(16px, 2vw, 26px);
      margin-bottom: 0;
    }

    h2 {
      color: dodgerblue;
      font-size: clamp(16px, 2.5vw, 24px);
      margin-top: 0;
    }

    .logo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 3vh auto;
      max-width: 95%;
    }

    .logo-row img {
      height: auto;
      max-width: 52%;
    }

    .about {
      margin: 30px auto 15px;
      max-width: 450px;
      text-align: center;
    }

    .contact-info {
      padding: 2vw;
      background-color: #f4f4f4;
      border-radius: 8px;
      margin: 15px auto;
      max-width: 90%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .contact-info h2 {
      color: darkgray;
      font-size: clamp(16px, 2vw, 26px);
    }

    .map-link {
      margin: 20px auto;
      max-width: 90%;
    }

    .map-link a {
      display: block;
      width: 100%;
      padding: 12px 0;
      background-color: dodgerblue;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
/*
    .about-link {
      text-decoration: none;   /* remove underline from the link */
      border: none;            /* kill any border */
    }

    .about-link h2 {
      margin: 0;               /* remove extra spacing */
      padding: 0;              /* tighten layout */

      border: none;            /* ensure no line */
      color: dodgerblue;       /* your chosen color */
      cursor: pointer;         /* show it's clickable */
    }
*/
    .about-link h2:hover {
      color: darkgray;         /* subtle hover effect */
    }
  </style>
</head>
<body>
<img src="jsophil.jpg" alt="JSOPhil Enterprises" class="jsophil-logo">

<div class="header">
  <h1>Welcome to JSOPhil Enterprises</h1>
  <h2><i>"Your trusted Marine Supplier since 1992"</i></h2>

  <div class="logo-row">
    <a href="https://www.globalsuzuki.com/marine/" target="_blank" rel="noopener noreferrer">
      <img src="suzuki.jpg" alt="SUZUKI MARINE">
    </a>
    <a href="https://www.international-marine.com/" target="_blank" rel="noopener noreferrer">
      <img src="internationallogo.jpg" alt="International Paint">
    </a>
  </div>

  <div class="about">
    <!-- Placeholder: clickable icon linking to About page -->
    <a href="about.html" class="about-link">
      <h2><i>Who we are</i></h2>
    </a>
  </div>

  <div class="contact-info">
    <h2>📍 Contact Information</h2>
    <p><small><i>Address:</i></small> <strong>Manila Cavite Road, Barangay 8, Cavite City</strong></p>
    <p>
      <small><i>Phone:</i></small> <strong>+63 949 364 9240</strong>
      <span style="margin-left:20px;"></span>
      <small><i>Email:</i></small> <a href="mailto:jsophil@gmail.com"><strong>jsophil@gmail.com</strong></a>
    </p>
  </div>

  <div class="map-link">
    <a href="https://maps.app.goo.gl/j5pVhVYvELZS8DoV8" target="_blank" rel="noopener noreferrer">
      📍 View Location on Google Maps
    </a>
  </div>
</div>
</body>
</html>
