<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to JSOPhil Enterprises</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JSOPhil Enterprises - Suzuki Marine dealer and Ecstar Oil retailer. Contact us for genuine Suzuki Outboards, spare parts, services, support, Ecstar oil, and marine services.">
  <meta name="keywords" content="JSOPhil, JSOPhil Enterprises, Suzuki Marine, Ecstar Oil, Suzuki parts, marine services, Outboard Engines, PMS">
  <meta name="author" content="Jaco Soler">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      margin: 0;
      padding: 0;
      text-align: center;
      overflow-x: hidden; /* prevent sideways scroll */
    }

    .jsophil-logo {
      display: block;
      margin: 15px auto;
      width: 45vw; /* reduced to 3/4 size */
      height: auto;
    }

    h1, h2, p {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    h1 {
      color: darkgray;
      font-size: clamp(16px, 2vw, 26px);
      margin-bottom: 0; /* tighter spacing */
    }

    h2 {
      color: dodgerblue;
      font-size: clamp(16px, 2.5vw, 24px);
      margin-top: 0; /* tagline nearly touching Welcome */
    }

    p {
      font-size: clamp(12px, 1.8vw, 16px);
    }

    .top-brands {
      margin-top: 15px;
      margin-bottom: 20px;
    }

    .logo-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 3vh auto;
      max-width: 95%;
    }

    .logo-row img {
      height: auto;
      max-width: 52%; /* enlarged logos but still fit one row */
    }

    .top-products {
      margin-top: 20px;
      margin-bottom: 15px;
      font-size: clamp(12px, 2vw, 16px);
      font-style: italic;
      font-weight: bold;
    }

    /* Products layout */
    .products-layout {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 95%;
      margin: 20px auto;
    }

    .parts-column {
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* left-justified */
      gap: 15px;
    }

    .top-line, .bottom-line {
      display: flex;
      gap: 15px;
    }

    .parts-column img {
      max-width: 80px; /* smaller parts images */
    }

    .engines-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* center engines vertically */
      gap: 20px;
    }

    .engines-column img {
      max-width: 150px; /* larger engine images */
    }

    figure {
      margin: 0;
      text-align: center;
    }

    figcaption {
      font-size: 12px;
      margin-top: 5px;
      color: #333;
    }

    .about {
      margin: 15px auto;
      max-width: 450px; /* narrower wrap for About Us */
      text-align: center;
    }

    .contact-info {
      padding: 2vw;
      background-color: #f4f4f4;
      border-radius: 8px;
      margin: 15px auto;
      max-width: 90%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .contact-info h2 {
      color: darkgray;
      font-size: clamp(16px, 2vw, 26px);
    }

    .contact-info strong,
    .contact-info a {
      font-size: 1.1em; /* slightly bigger phone/email */
    }

    .map-link {
      margin: 20px auto;
      max-width: 90%;
    }

    .map-link a {
      display: block;
      width: 100%;
      padding: 12px 0;
      background-color: dodgerblue;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .map-link a:hover {
      background-color: #005bb5;
    }

    /* Mobile Portrait Optimization */
    @media (max-width: 480px) {
      .jsophil-logo {
        width: 70vw; /* smaller logo for mobile */
        margin-top: 10px;
      }

      h1 {
        font-size: 18px;
      }

      h2 {
        font-size: 16px;
      }

      p {
        font-size: 13px;
      }

      .logo-row {
        flex-direction: row; /* force one row */
        justify-content: space-between;
        gap: 10px;
      }

      .logo-row img {
        max-width: 50%; /* slightly smaller for mobile */
      }

      .parts-column img {
        max-width: 60px;
      }

      .engines-column img {
        max-width: 120px;
      }

      .contact-info {
        padding: 12px;
        max-width: 95%;
      }

      .map-link a {
        font-size: 14px;
        padding: 10px;
      }

      .about {
        max-width: 90%;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
<img src="jsophil.jpg" alt="JSOPhil Enterprises" class="jsophil-logo">

<div class="header">
  <h1>Welcome to JSOPhil Enterprises</h1>
  <h2><i>"Your trusted Marine Supplier since 1992"</i></h2>
  <p class="top-brands"><i><b>"TOP BRANDS"</b></i></p>

  <div class="logo-row">
    <a href="https://www.globalsuzuki.com/marine/" target="_blank" rel="noopener noreferrer">
      <img src="suzuki.jpg" alt="SUZUKI MARINE">
    </a>
    <a href="https://www.international-marine.com/" target="_blank" rel="noopener noreferrer">
      <img src="internationallogo.jpg" alt="International Paint">
    </a>
  </div>

  <p class="top-products">TOP PRODUCTS</p>
  <div class="products-layout">
    <!-- Left column: parts -->
    <div class="parts-column">
      <div class="top-line">
        <figure>
          <img src="ecstar-marine-oil.jpg" alt="Ecstar Marine Engine Oil">
          <figcaption>Ecstar Marine Engine Oil</figcaption>
        </figure>
        <figure>
          <img src="9900022B48ECSTARMarineGearOil.jpg" alt="Ecstar Gear Lube">
          <figcaption>Ecstar Gear Oil</figcaption>
        </figure>
        <figure>
          <img src="1651061A31OilFilter.jpg" alt="Spark Plugs">
          <figcaption>Oil Filters</figcaption>
        </figure>
      </div>
      <div class="bottom-line">
        <figure>
          <img src="1541293J10000FuelFilterLOElement.jpg" alt="Fuel Filter">
          <figcaption>Fuel Filter</figcaption>
        </figure>
        <figure>
          <img src="waterseparator.jpg" alt="Water Separator Filter">
          <figcaption>Water Separator Filter</figcaption>
        </figure>
      </div>
    </div>

    <!-- Right column: engines -->
    <div class="engines-column">
      <figure>
        <img src="df300a.jpg" alt="Suzuki DF300A">
        <figcaption>Suzuki DF300A</figcaption>
      </figure>
      <figure>
        <img src="df15.jpg" alt="Suzuki DF15">
        <figcaption>Suzuki DF15</figcaption>
      </figure>
    </div>
  </div>

  <div class="about">
    <h2>⚙️ About Us</h2>
  </div>

  <div class="contact-info">
    <h2>📍 Contact Information</h2>
    <p>
      <small><i>Address:</i></small>
      <strong>Manila Cavite Road, Barangay 8,<br>Dalahican 4102, Cavite City</strong>
    </p>
    <p>
      <small><i>Phone:</i></small>
      <strong>+63 949 364 9240</strong>
      <span style="margin-left:20px;"></span>
      <small><i>Email:</i></small>
      <a href="mailto:jsophil@gmail.com"><strong>jsophil@gmail.com</strong></a>
    </p>
  </div>

  <!-- Google Maps Link at very bottom -->
  <div class="map-link">
    <a href="https://maps.app.goo.gl/j5pVhVYvELZS8DoV8"
       target="_blank" rel="noopener noreferrer">
      📍 View Location on Google Maps
    </a>
  </div>
</div>
</body>
</html>
